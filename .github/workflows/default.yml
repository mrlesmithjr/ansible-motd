---
name: Molecule Test
on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: "0 6 * * 0"

concurrency:
  group: molecule-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          ansible --version
          molecule --version
      - name: Test with molecule
        run: |
          molecule test --scenario-name ubuntu2204
          # The following scenarios target EOL distros with dead package
          # mirrors (centos7/centos8/debian8/debian9/debian10/ubuntu1604) or
          # an unpinned/rolling image with no arm64 manifest and an
          # unverified target-Python story (fedora), and ubuntu1804's
          # target Python (3.6) is incompatible with modern ansible-core.
          # Left in molecule/ for reference; see issue for follow-up.
          # molecule test --scenario-name centos7
          # molecule test --scenario-name centos8
          # molecule test --scenario-name debian8
          # molecule test --scenario-name debian9
          # molecule test --scenario-name debian10
          # molecule test --scenario-name fedora
          # molecule test --scenario-name ubuntu1604
          # molecule test --scenario-name ubuntu1804
